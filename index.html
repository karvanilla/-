// Рендер
const container = document.getElementById('questionsRoot');
function renderAll() {
    let html = '';
    for (let i = 0; i < QUESTIONS.length; i++) {
        const q = QUESTIONS[i];
        const num = i+1;
        html += `<div class="question-card" id="card${i}">
                    <div class="q-title">${num}. ${q.text}</div>
                    <ul class="options-list" id="opts${i}">`;
        for (let o = 0; o < q.options.length; o++) {
            const letter = String.fromCharCode(65+o);
            html += `<li><label class="option-label">
                        <input type="radio" name="q${i}" value="${o}">
                        <span class="opt-letter">${letter}.</span>
                        <span>${q.options[o]}</span>`;
            if (q.hasImages && q.imgNames && q.imgNames[o]) {
                html += `<div class="option-img"><img src="image/${q.imgFolder}${q.imgNames[o]}.png" alt="схема ${q.imgNames[o]}"></div>`;
            }
            html += `</label></li>`;
        }
        html += `</ul><div id="hint${i}" style="display:none;"></div></div>`;
    }
    container.innerHTML = html;
}

function checkAnswers() {
    let correctCount = 0;
    for (let i = 0; i < QUESTIONS.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const val = selected ? parseInt(selected.value) : -1;
        const isOk = (val === QUESTIONS[i].correct);
        if (isOk && val !== -1) correctCount++;
        const labels = document.querySelectorAll(`#opts${i} .option-label`);
        labels.forEach((label, idx) => {
            label.classList.remove('correct-opt', 'wrong-opt');
            if (idx === QUESTIONS[i].correct) label.classList.add('correct-opt');
            if (val === idx && idx !== QUESTIONS[i].correct) label.classList.add('wrong-opt');
        });
        const hint = document.getElementById(`hint${i}`);
        if (val !== QUESTIONS[i].correct && val !== -1) {
            const letter = String.fromCharCode(65 + QUESTIONS[i].correct);
            hint.style.display = 'block';
            hint.innerHTML = `<div class="hint-message">✓ Верный ответ: ${letter}. ${QUESTIONS[i].options[QUESTIONS[i].correct]}</div>`;
        } else hint.style.display = 'none';
    }
    return correctCount;
}

document.getElementById('checkBtn').addEventListener('click', () => {
    const total = QUESTIONS.length;
    const right = checkAnswers();
    const percent = Math.round(right/total*100);
    const resultDiv = document.getElementById('resultArea');
    resultDiv.style.display = 'block';
    let msg = percent >= 80 ? 'Отлично!' : (percent >= 60 ? 'Хорошо, но повторите.' : 'Рекомендуется изучить материал заново.');
    resultDiv.innerHTML = `<div class="result-score">${right} / ${total} (${percent}%)</div><div>${msg}</div>`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});

renderAll();
</script>
